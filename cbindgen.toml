language = "C"

include_guard = "LYMUI_C_H"
pragma_once = true

autogen_warning = "/* Warning, this file is autogenerated by cbindgen.  Do not modify this manually. */"

# Only process our own crate (skip lymui internals).
[parse]
parse_deps = false

# Sort exported functions alphabetically so diffs are stable.
[fn]
sort_by = "Name"

# Explicitly list every type that C consumers need.  Types not listed here
# are elided from the header even if they carry #[repr(C)].
[export]
include = [
    "Color",
    "ColorResult",
    "ColorMapping",
    "Error",
    "Generator",
    "GeneratorKind",
    "Grayscale",
    "Lumens",
    "RgbGenerator",
]
